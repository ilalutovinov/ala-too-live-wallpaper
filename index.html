<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ala-Too Live Cam</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        
        .video-wrapper {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        #v { 
            position: absolute;
            top: -40px; 
            left: 0;
            width: 100vw; 
            height: calc(100vh + 40px); 
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="video-wrapper">
        <video id="v" autoplay muted loop playsinline></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const video = document.getElementById('v');
        const source = 'https://webcam.elcat.kg/Bishkek_Ala-Too_Square/tracks-v1/mono.m3u8';
        let hls;

        function startStream() {
            if (hls) { hls.destroy(); }

            hls = new Hls({
                lowLatencyMode: true,
                maxBufferLength: 5 
            });
            
            hls.loadSource(source);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        }

        startStream();
        setInterval(startStream, 600000);
    </script>
</body>
</html>
